kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: act-runner-vol
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
# ---
# apiVersion: v1
# data:
#   token: WW2x8vhZSdkEDbrOTIXUg5Q5hq9xpRUEjhMLsU0H
# kind: Secret
# metadata:
#   name: runner-secret
# type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: act-runner
  name: act-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: act-runner-vol


      securityContext:
        fsGroup: 1000
      containers:
      - name: runner
        # image: gitea/act_runner:nightly-dind-rootless
        image: 127.0.0.1:30500/act_runner_root
        imagePullPolicy: Always
        # command: ["sh", "-c", "while ! nc -z localhost 2376 </dev/null; do echo 'waiting for docker daemon...'; sleep 5; done; /sbin/tini -- /opt/act/run.sh"]
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2376
        - name: DOCKER_CERT_PATH
          value: /certs/client
        - name: DOCKER_TLS_VERIFY
          value: "1"
        - name: GITEA_INSTANCE_URL
          value: http://gitea:3000
        - name: GITEA_RUNNER_REGISTRATION_TOKEN
          value: "WW2x8vhZSdkEDbrOTIXUg5Q5hq9xpRUEjhMLsU0H"

        securityContext:
          privileged: true
        volumeMounts:
        - name: runner-data
          mountPath: /data
        resources:
          limits:
            memory: "2000Mi"
            cpu: "1000m"